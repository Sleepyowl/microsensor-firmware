# Peripherals I need
CONFIG_GPIO=y
CONFIG_SENSOR=y
CONFIG_RTC=y
CONFIG_RTC_ALARM=y
CONFIG_I2C=y
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# BLE
CONFIG_BT=y
CONFIG_BT_EXT_ADV=y
# CONFIG_BT_PER_ADV=y
# CONFIG_BT_BROADCASTER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="BeeEyeSensor"
CONFIG_BT_DEVICE_APPEARANCE=833
CONFIG_BT_LL_SOFTDEVICE=y
# CONFIG_BT_CTLR_ADVANCED_FEATURES=y
# CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y

# Sytem options
CONFIG_POWEROFF=y
CONFIG_REBOOT=y
CONFIG_HWINFO=y
CONFIG_PM_DEVICE=y
CONFIG_TICKLESS_KERNEL=y
CONFIG_MINIMAL_LIBC=y
CONFIG_MINIMAL_LIBC_TIME=y

# Disable features I don't need
CONFIG_SPI=n
CONFIG_PWM=n

# UART
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y

# LOGGGY
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
# CONFIG_ASSERT=y
# CONFIG_ASSERT_VERBOSE=y